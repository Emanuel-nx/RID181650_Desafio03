<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNC Technologies — Task Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f13;
      --surface:   #18181f;
      --card:      #1e1e28;
      --border:    #2a2a38;
      --accent:    #6c63ff;
      --accent2:   #ff6584;
      --accent3:   #43e97b;
      --text:      #e8e8f0;
      --muted:     #8888a8;
      --done-bg:   #16221a;
      --done-text: #43e97b;
      --radius:    14px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Rubik', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Grain overlay ─────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: .6;
    }

    /* ── Header ────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(15,15,19,.85);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }

    .logo {
      display: flex; align-items: center; gap: .6rem;
      font-weight: 700; font-size: 1.1rem; letter-spacing: -.3px;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem;
    }

    .logo span { color: var(--muted); font-weight: 400; margin-left: .2rem; }

    .header-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: .35rem .85rem;
      font-size: .78rem;
      color: var(--muted);
    }

    .header-badge b { color: var(--accent); }

    /* ── Main ──────────────────────────────────────────────── */
    main {
      flex: 1;
      padding: 2rem 1.25rem 3rem;
      max-width: 900px;
      width: 100%;
      margin-inline: auto;
    }

    /* ── Page title ────────────────────────────────────────── */
    .page-title {
      margin-bottom: 2rem;
    }

    .page-title h1 {
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      font-weight: 700;
      letter-spacing: -.5px;
      line-height: 1.2;
    }

    .page-title h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page-title p {
      color: var(--muted);
      margin-top: .4rem;
      font-size: .92rem;
    }

    /* ── Add task form ─────────────────────────────────────── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }

    .form-card h2 {
      font-size: .9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .form-row {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: .4rem;
      flex: 1;
      min-width: 160px;
    }

    .form-group label {
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
    }

    .form-group input,
    .form-group select {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .65rem .9rem;
      color: var(--text);
      font-family: inherit;
      font-size: .92rem;
      outline: none;
      transition: border-color .2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,.15);
    }

    .form-group input::placeholder { color: var(--muted); }

    .form-group select option { background: var(--card); }

    .btn-add {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .65rem 1.4rem;
      font-family: inherit;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: .5rem;
      transition: background .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #7c74ff;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(108,99,255,.4);
    }

    .btn-add:active { transform: translateY(0); }

    /* ── Stats strip ───────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .75rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      text-align: center;
    }

    .stat-card .num {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
    }

    .stat-card .lbl {
      font-size: .75rem;
      color: var(--muted);
      margin-top: .3rem;
      font-weight: 500;
    }

    .stat-card.total .num  { color: var(--text); }
    .stat-card.pending .num { color: var(--accent2); }
    .stat-card.done .num    { color: var(--accent3); }

    /* ── Task list ─────────────────────────────────────────── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-header h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    .tag {
      font-size: .75rem;
      border-radius: 99px;
      padding: .2rem .65rem;
      font-weight: 600;
    }

    .tag.pending { background: rgba(255,101,132,.12); color: var(--accent2); }
    .tag.done    { background: rgba(67,233,123,.12);  color: var(--accent3); }

    #task-list {
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    /* ── Task card ─────────────────────────────────────────── */
    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: border-color .25s, box-shadow .25s, transform .2s;
      animation: slideIn .3s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-card:hover {
      border-color: rgba(108,99,255,.35);
      box-shadow: 0 2px 16px rgba(108,99,255,.1);
    }

    .task-card.completed {
      background: var(--done-bg);
      border-color: rgba(67,233,123,.2);
    }

    .task-card.completed:hover {
      border-color: rgba(67,233,123,.4);
      box-shadow: 0 2px 16px rgba(67,233,123,.08);
    }

    /* priority dot */
    .priority-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .priority-dot.alta   { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .priority-dot.media  { background: #f6c90e; box-shadow: 0 0 6px #f6c90e; }
    .priority-dot.baixa  { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }

    .task-info { flex: 1; min-width: 0; }

    .task-name {
      font-size: .95rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color .2s;
    }

    .task-card.completed .task-name {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-top: .25rem;
    }

    .task-category {
      font-size: .73rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .1rem .45rem;
    }

    .task-date {
      font-size: .73rem;
      color: var(--muted);
    }

    /* complete button */
    .btn-complete {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: .45rem .85rem;
      color: var(--text);
      font-family: inherit;
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s, border-color .2s, color .2s;
      white-space: nowrap;
    }

    .btn-complete:hover {
      background: rgba(108,99,255,.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* check icon when completed */
    .check-icon {
      width: 32px; height: 32px;
      background: rgba(67,233,123,.12);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--accent3);
      font-size: 1rem;
    }

    /* ── Delete button ─────────────────────────────────────── */
    .btn-delete {
      background: transparent;
      border: none;
      border-radius: 8px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      cursor: pointer;
      flex-shrink: 0;
      font-size: 1rem;
      transition: background .2s, color .2s;
    }

    .btn-delete:hover {
      background: rgba(255,101,132,.12);
      color: var(--accent2);
    }

    .task-actions {
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    /* ── Empty state ───────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      display: none;
    }

    .empty-state .icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .empty-state p { font-size: .9rem; }

    /* ── Footer ────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .5rem;
    }

    .footer-counter {
      font-size: .85rem;
      color: var(--muted);
    }

    .footer-counter b { color: var(--accent3); }

    .footer-brand {
      font-size: .78rem;
      color: var(--muted);
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 540px) {
      header { padding: 1rem 1.25rem; }
      .form-row { flex-direction: column; }
      .btn-add  { width: 100%; justify-content: center; }
      .stats { grid-template-columns: repeat(3,1fr); gap: .5rem; }
      .stat-card { padding: .75rem .5rem; }
      .stat-card .num { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      DNC <span>Technologies</span>
    </div>
    <div class="header-badge">Task Board <b id="hdr-count">0</b></div>
  </header>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main>

    <div class="page-title">
      <h1>Gerenciador de <span>Tarefas</span></h1>
      <p>Organize, priorize e conclua suas tarefas com eficiência.</p>
    </div>

    <!-- Form -->
    <div class="form-card">
      <h2>Nova Tarefa</h2>
      <div class="form-row">
        <div class="form-group" style="flex:2; min-width:200px;">
          <label for="task-name">Nome da tarefa</label>
          <input id="task-name" type="text" placeholder="Ex: Revisar relatório mensal…" />
        </div>
        <div class="form-group">
          <label for="task-category">Categoria</label>
          <select id="task-category">
            <option value="Geral">Geral</option>
            <option value="Design">Design</option>
            <option value="Dev">Dev</option>
            <option value="Marketing">Marketing</option>
            <option value="Reunião">Reunião</option>
          </select>
        </div>
        <div class="form-group">
          <label for="task-priority">Prioridade</label>
          <select id="task-priority">
            <option value="media">Média</option>
            <option value="alta">Alta</option>
            <option value="baixa">Baixa</option>
          </select>
        </div>
        <button class="btn-add" id="btn-add" onclick="addTask()">
          + Adicionar
        </button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card total">
        <div class="num" id="stat-total">0</div>
        <div class="lbl">Total</div>
      </div>
      <div class="stat-card pending">
        <div class="num" id="stat-pending">0</div>
        <div class="lbl">Pendentes</div>
      </div>
      <div class="stat-card done">
        <div class="num" id="stat-done">0</div>
        <div class="lbl">Concluídas</div>
      </div>
    </div>

    <!-- Task list -->
    <div class="section-header">
      <h2>Tarefas</h2>
      <span class="tag pending" id="pending-tag">0 pendentes</span>
    </div>

    <div id="task-list"></div>

    <div class="empty-state" id="empty-state">
      <div class="icon">📋</div>
      <p>Nenhuma tarefa ainda. Adicione sua primeira tarefa acima!</p>
    </div>

  </main>

  <!-- ── Footer ─────────────────────────────────────────── -->
  <footer>
    <div class="footer-counter">
      <b id="footer-done">0</b> de <span id="footer-total">0</span> tarefas concluídas
    </div>
    <div class="footer-brand">DNC Technologies © 2025</div>
  </footer>

  <!-- ── JavaScript ─────────────────────────────────────── -->
  <script>
    // ── State ────────────────────────────────────────────
    let tasks = [];
    let nextId = 1;

    // ── Initial data ─────────────────────────────────────
    const initialTasks = [
      { name: 'Revisar protótipo no Figma',     category: 'Design',    priority: 'alta' },
      { name: 'Implementar autenticação JWT',   category: 'Dev',       priority: 'alta' },
      { name: 'Criar campanha de e-mail',        category: 'Marketing', priority: 'media' },
      { name: 'Alinhar sprint com o time',       category: 'Reunião',   priority: 'media' },
      { name: 'Atualizar documentação da API',   category: 'Dev',       priority: 'baixa' },
    ];

    // ── Helpers ───────────────────────────────────────────
    function today() {
      return new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
    }

    // ── Render ────────────────────────────────────────────
    function render() {
      const list = document.getElementById('task-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';

      if (tasks.length === 0) {
        empty.style.display = 'block';
      } else {
        empty.style.display = 'none';
        tasks.forEach(t => list.appendChild(createCard(t)));
      }

      updateStats();
    }

    function createCard(task) {
      const card = document.createElement('div');
      card.className = 'task-card' + (task.completed ? ' completed' : '');
      card.id = 'task-' + task.id;

      const priorityLabels = { alta: 'Alta', media: 'Média', baixa: 'Baixa' };

      const action = task.completed
        ? `<div class="task-actions"><div class="check-icon">✔</div><button class="btn-delete" onclick="deleteTask(${task.id})" title="Excluir tarefa">🗑</button></div>`
        : `<div class="task-actions"><button class="btn-complete" onclick="completeTask(${task.id})">Concluir</button><button class="btn-delete" onclick="deleteTask(${task.id})" title="Excluir tarefa">🗑</button></div>`;

      card.innerHTML = `
        <div class="priority-dot ${task.priority}"></div>
        <div class="task-info">
          <div class="task-name">${escHtml(task.name)}</div>
          <div class="task-meta">
            <span class="task-category">${escHtml(task.category)}</span>
            <span class="task-date">${task.date}</span>
          </div>
        </div>
        ${action}
      `;
      return card;
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ── Stats ─────────────────────────────────────────────
    function updateStats() {
      const total   = tasks.length;
      const done    = tasks.filter(t => t.completed).length;
      const pending = total - done;

      document.getElementById('stat-total').textContent   = total;
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-done').textContent    = done;
      document.getElementById('footer-done').textContent  = done;
      document.getElementById('footer-total').textContent = total;
      document.getElementById('hdr-count').textContent    = total;
      document.getElementById('pending-tag').textContent  = pending + ' pendentes';
    }

    // ── Add task ──────────────────────────────────────────
    function addTask() {
      const nameEl     = document.getElementById('task-name');
      const categoryEl = document.getElementById('task-category');
      const priorityEl = document.getElementById('task-priority');

      const name = nameEl.value.trim();
      if (!name) {
        nameEl.focus();
        nameEl.style.borderColor = 'var(--accent2)';
        setTimeout(() => nameEl.style.borderColor = '', 1200);
        return;
      }

      tasks.push({
        id: nextId++,
        name,
        category: categoryEl.value,
        priority: priorityEl.value,
        completed: false,
        date: today(),
      });

      nameEl.value = '';
      render();
    }

    // ── Complete task ─────────────────────────────────────
    function completeTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task || task.completed) return;
      task.completed = true;

      // Animate card swap
      const card = document.getElementById('task-' + id);
      if (card) {
        card.style.transition = 'opacity .2s, transform .2s';
        card.style.opacity = '0';
        card.style.transform = 'scale(.96)';
        setTimeout(() => render(), 200);
      } else {
        render();
      }
    }

    // ── Delete task ───────────────────────────────────────
    function deleteTask(id) {
      const card = document.getElementById('task-' + id);
      if (card) {
        card.style.transition = 'opacity .2s, transform .2s, max-height .25s';
        card.style.opacity = '0';
        card.style.transform = 'translateX(16px)';
        setTimeout(() => {
          tasks = tasks.filter(t => t.id !== id);
          render();
        }, 200);
      } else {
        tasks = tasks.filter(t => t.id !== id);
        render();
      }
    }

    // ── Enter key shortcut ────────────────────────────────
    document.getElementById('task-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    // ── Init ──────────────────────────────────────────────
    initialTasks.forEach(t => {
      tasks.push({ id: nextId++, ...t, completed: false, date: today() });
    });
    render();
  </script>

</body>
</html>
